services:

  ############################################
  # HashiCorp Vault (JWE key management)
  ############################################

  vault:
    image: hashicorp/vault:2.0.3
    ports:
      # Published on 8201 to avoid clashing with other locally running Vault instances
      - "8201:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: [ "CMD", "vault", "status", "-address=http://127.0.0.1:8200" ]
      interval: 2s
      timeout: 5s
      retries: 30

  # Creates the transit secret engine and the exportable rsa-4096 key used by the JWE starter
  # (see jeap.jwe.vault.* in jme-jwe-scs/jme-jwe-scs-web/src/main/resources/application.yml).
  # The key is rotated once so that two key versions exist: the backend encrypts with the newest
  # version but still decrypts payloads encrypted with the previous version (rotation grace),
  # and the JWKS endpoint serves both public keys.
  vault_init:
    image: hashicorp/vault:2.0.3
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
      # Bypass the corporate proxy injected by the CI docker daemon, otherwise the
      # vault CLI cannot reach http://vault:8200 (proxy answers 504 DNS look up failed)
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: vault
    entrypoint:
      - /bin/sh
      - -exc
      - |
        vault secrets enable -path=transit/jme transit || true
        vault write -f transit/jme/keys/jme-jwe-scs-key type=rsa-4096 exportable=true
        vault write -f transit/jme/keys/jme-jwe-scs-key/rotate
        vault read transit/jme/keys/jme-jwe-scs-key
